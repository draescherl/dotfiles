format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$package\
$python\
$rust\
$scala\
$cmd_duration\
$character
"""

# Remove line separator between shell prompts
add_newline = false

[c]
symbol = " "

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "

[cmd_duration]
min_time = 1_000
show_notifications = true
min_time_to_notify = 30_000
format = '[\($duration\)](bold yellow)'

[directory]
read_only = " "
truncate_to_repo = false
truncation_symbol = ".../"
truncation_length = 2

[git_branch]
symbol = " "

[package]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[scala]
symbol = " "
