format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$package\
$c\
$haskell\
$java\
$nodejs\
$python\
$rust\
$scala\
$cmd_duration\
$character
"""


# Remove line separator between shell prompts
add_newline = false

[c]
symbol = " "

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "

[cmd_duration]
min_time = 1_000

[directory]
read_only = " "
truncate_to_repo = false
truncation_symbol = ".../"

[docker_context]
symbol = " "

[git_branch]
symbol = " "

[haskell]
symbol = " "

[java]
symbol = " "

[nodejs]
symbol = " "

[package]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[scala]
symbol = " "