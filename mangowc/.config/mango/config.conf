# More options: https://github.com/DreamMaoMao/mango/wiki/
# Converted from sway config

monitorrule=name:DP-3,make:Xiaomi Corporation,model:Mi Monitor,width:3440,height:1440,refresh:144,x:0,y:0

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 2
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=5
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=0
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# Keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=fr

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=1
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=0
accel_profile=1

# Appearance (Catppuccin Frappe)
gappih=5
gappiv=5
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
rootcolor=0x303446ff
bordercolor=0x51576dff
focuscolor=0x8caaeeff
maximizescreencolor=0x89aa61ff
urgentcolor=0xe78284ff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Layout per workspace
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Autostart
exec=swaybg --image ~/wallpapers/current --mode fill
exec=swaync
exec=waybar
exec=wl-paste --type text --watch cliphist store
exec=wl-paste --type image --watch cliphist store
exec=dbus-update-activation-environment --systemd --all
exec=nm-applet --indicator
exec=swayidle -w timeout 60 'swaylock -f' before-sleep 'swaylock -f'

# Key Bindings
# key names via `wev`, mod keys: super,ctrl,alt,shift,none

# Core
bind=SUPER+SHIFT,q,killclient,
bind=SUPER+SHIFT,r,reload_config
bind=SUPER,Return,spawn,alacritty
bind=SUPER,m,spawn,fuzzel
bind=SUPER,f,spawn,nautilus -w
bind=SUPER+SHIFT,v,spawn,cliphist list | fuzzel --dmenu | cliphist decode | wl-copy && wtype -M ctrl -M shift -k v -m ctrl
bind=SUPER+SHIFT,o,spawn,swaylock -f && sleep 2 && systemctl suspend
bind=SUPER,o,spawn,swaylock -f
bind=SUPER,n,spawn,swaync-client -t -sw

# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=NONE,XF86AudioLowerVolume,spawn,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=NONE,XF86AudioMute,spawn,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 20%-
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 20%+
bind=NONE,Print,spawn,grimshot --notify --cursor savecopy area
bind=SUPER+SHIFT,s,spawn,grimshot --notify --cursor savecopy area

# Waybar toggle
bind=SUPER,y,spawn,pkill -SIGUSR1 waybar

# Focus (vim keys)
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

# Move windows (vim keys)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# Layout
bind=SUPER,z,togglefullscreen
bind=SUPER,e,switch_layout

# Floating
bind=SUPER+SHIFT,space,togglefloating,
bind=SUPER,space,focusstack,next
bind=SUPER+CTRL,space,toggleoverlay

# Scratchpad
bind=SUPER+SHIFT,p,minimized,
bind=SUPER,p,toggle_scratchpad

# Resize (vim keys)
bind=CTRL+ALT,h,resizewin,-50,+0
bind=CTRL+ALT,l,resizewin,+50,+0
bind=CTRL+ALT,j,resizewin,+0,+50
bind=CTRL+ALT,k,resizewin,+0,-50

# Move floating windows (vim keys)
bind=CTRL+SHIFT,h,movewin,-50,+0
bind=CTRL+SHIFT,l,movewin,+50,+0
bind=CTRL+SHIFT,j,movewin,+0,+50
bind=CTRL+SHIFT,k,movewin,+0,-50

# Workspaces (AZERTY - French layout)
bind=SUPER,ampersand,view,1,0
bind=SUPER,eacute,view,2,0
bind=SUPER,quotedbl,view,3,0
bind=SUPER,apostrophe,view,4,0
bind=SUPER,parenleft,view,5,0
bind=SUPER,minus,view,6,0
bind=SUPER,egrave,view,7,0
bind=SUPER,underscore,view,8,0
bind=SUPER,ccedilla,view,9,0

# Move client to workspace (AZERTY)
bind=SUPER+SHIFT,ampersand,tag,1,0
bind=SUPER+SHIFT,eacute,tag,2,0
bind=SUPER+SHIFT,quotedbl,tag,3,0
bind=SUPER+SHIFT,apostrophe,tag,4,0
bind=SUPER+SHIFT,parenleft,tag,5,0
bind=SUPER+SHIFT,minus,tag,6,0
bind=SUPER+SHIFT,egrave,tag,7,0
bind=SUPER+SHIFT,underscore,tag,8,0
bind=SUPER+SHIFT,ccedilla,tag,9,0

# Move workspace to monitor
bind=SUPER+CTRL+SHIFT,l,tagmon,right
bind=SUPER+CTRL+SHIFT,h,tagmon,left

# Focus monitor
bind=SUPER+ALT,l,focusmon,right
bind=SUPER+ALT,h,focusmon,left

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Layer rules
layerrule=animation_type_open:zoom,layer_name:fuzzel
layerrule=animation_type_close:zoom,layer_name:fuzzel
